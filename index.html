<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Chat</title>

<style>
body{font-family:Arial;background:#0b0b15;color:white;padding:20px}
.container{max-width:800px;margin:auto}
.card{background:#151520;padding:20px;border-radius:20px;margin-bottom:20px}
input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;background:#1e1e2f;color:white}
button{width:100%;padding:10px;border:none;border-radius:10px;background:#6d28d9;color:white;cursor:pointer;margin-top:6px}
.chat-message{background:#11111a;padding:12px;border-radius:15px;margin-bottom:10px}
.small{font-size:0.8rem;opacity:0.7}
.admin{border:3px solid red}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🔐 Secure Chat</h2>

<div id="onlineUsers" class="small"></div>

<input id="username" placeholder="Naam">
<textarea id="message" placeholder="Bericht"></textarea>
<input type="password" id="password" placeholder="Wachtwoord">

<div id="typing" class="small"></div>

<button onclick="sendMessage()">Verstuur</button>
</div>

<div class="card">
<h3>💬 Chat</h3>
<div id="chatBox"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, push, onChildAdded, onValue,
  remove, set, onDisconnect, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ✅ Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAOf0zOHS74vTPFlt4HMwjnCg-7FobaBk0",
  authDomain: "fir-chat-53f7d.firebaseapp.com",
  databaseURL: "https://fir-chat-53f7d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fir-chat-53f7d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const DELETE_TIME = 60 * 60 * 1000;
const userId = Math.random().toString(36).slice(2);

// ✅ state
let currentUsername = "";
let isAdmin = false;

let lastMessageTime = 0;
let lastMessageText = "";

// 🔑 admin sleutel
const ADMIN_TRIGGER = "/admin";
const ADMIN_PASSWORD = "/admin";

// 🔐 crypto
const encoder = new TextEncoder();
const decoder = new TextDecoder();

async function getKey(password, salt){
  const km = await crypto.subtle.importKey("raw", encoder.encode(password),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt,iterations:250000,hash:"SHA-256"},
    km,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt","decrypt"]
  );
}

const b64 = x => btoa(String.fromCharCode(...new Uint8Array(x)));
const fromB64 = x => Uint8Array.from(atob(x),c=>c.charCodeAt(0));

// ✅ username claim
async function claimUsername(name){
  const r = ref(db,"usernames/"+name);

  const res = await runTransaction(r, c=>{
    if(c===null) return userId;
  });

  if(res.committed){
    onDisconnect(r).remove();
  }

  return res.committed;
}

// ✅ SEND
window.sendMessage = async () => {

  const u = username.value.trim();
  const m = message.value;
  const p = password.value;

  if(!u) return alert("Voer naam in");
  if(!m || !p) return alert("Vul alles in");

  // ✅ anti-spam
  const now = Date.now();
  if(now - lastMessageTime < 2000) return alert("Te snel!");
  if(m === lastMessageText) return alert("Geen spam!");

  lastMessageTime = now;
  lastMessageText = m;

  // ✅ admin login alleen voor X
  if(m === ADMIN_TRIGGER && p === ADMIN_PASSWORD){
    if(u !== "X") return alert("Geen admin toegang");
    isAdmin = true;
    document.body.classList.add("admin");
    updateDeleteButtons();
    return;
  }

  const ok = await claimUsername(u);
  if(!ok && currentUsername !== u) return alert("Naam bezet");

  currentUsername = u;

  // ✅ user encrypt
  const saltUser = crypto.getRandomValues(new Uint8Array(16));
  const ivUser = crypto.getRandomValues(new Uint8Array(12));
  const keyUser = await getKey(p, saltUser);

  const encUser = await crypto.subtle.encrypt(
    {name:"AES-GCM",iv:ivUser},
    keyUser,
    encoder.encode(m)
  );

  // ✅ admin encrypt
  const saltAdmin = crypto.getRandomValues(new Uint8Array(16));
  const ivAdmin = crypto.getRandomValues(new Uint8Array(12));
  const keyAdmin = await getKey(ADMIN_PASSWORD, saltAdmin);

  const encAdmin = await crypto.subtle.encrypt(
    {name:"AES-GCM",iv:ivAdmin},
    keyAdmin,
    encoder.encode(m)
  );

  const msgRef = push(ref(db,"messages"));

  set(msgRef,{
    user:u,
    saltUser:b64(saltUser),
    ivUser:b64(ivUser),
    dataUser:b64(encUser),
    saltAdmin:b64(saltAdmin),
    ivAdmin:b64(ivAdmin),
    dataAdmin:b64(encAdmin),
    time:Date.now()
  });

  message.value="";
};

// ✅ BUBBLE
function bubble(msg,key){

  if(!msg.dataUser || !msg.dataAdmin) return;

  const wrap=document.createElement("div");
  wrap.className="chat-message";

  const time=new Date(msg.time).toLocaleTimeString();

  wrap.innerHTML=`
  <b>${msg.user}</b> <span class="small">(${time})</span><br>
  <input type="password" class="pw" placeholder="wachtwoord">
  <button class="dec">Ontsleutel</button>
  <div></div>
  `;

  wrap.querySelector(".dec").onclick=async()=>{
    try{
      const pw = wrap.querySelector(".pw").value;
      let dec;

      try{
        const keyA = await getKey(pw, fromB64(msg.saltAdmin));
        dec = await crypto.subtle.decrypt(
          {name:"AES-GCM",iv:fromB64(msg.ivAdmin)},
          keyA,
          fromB64(msg.dataAdmin)
        );
      }catch{
        const keyU = await getKey(pw, fromB64(msg.saltUser));
        dec = await crypto.subtle.decrypt(
          {name:"AES-GCM",iv:fromB64(msg.ivUser)},
          keyU,
          fromB64(msg.dataUser)
        );
      }

      wrap.querySelector("div").innerText = decoder.decode(dec);
    }catch{
      wrap.querySelector("div").innerText="❌ fout";
    }
  };

  // ✅ delete
  const del=document.createElement("button");
  del.innerText="🗑️";

  if(!isAdmin) del.style.display="none";

  del.onclick=async()=>{
    await remove(ref(db,"messages/"+key));
    wrap.remove();
  };

  wrap.appendChild(del);

  chatBox.prepend(wrap);
}

// ✅ update delete knoppen
function updateDeleteButtons(){
  document.querySelectorAll(".chat-message button:last-child").forEach(b=>{
    b.style.display="block";
  });
}

// ✅ realtime
onChildAdded(ref(db,"messages"), snap=>{
  const msg=snap.val();
  if(Date.now()-msg.time>DELETE_TIME) return;
  bubble(msg,snap.key);
});

// ✅ auto delete
onValue(ref(db,"messages"), snap=>{
  const data=snap.val();
  if(!data) return;
  Object.entries(data).forEach(([k,m])=>{
    if(Date.now()-m.time>DELETE_TIME){
      remove(ref(db,"messages/"+k));
    }
  });
});

// ✅ ONLINE
const statusRef=ref(db,"online/"+userId);
const connectedRef=ref(db,".info/connected");

onValue(connectedRef,s=>{
  if(s.val()){
    onDisconnect(statusRef).set({online:false});
    updateStatus();
  }
});

function updateStatus(){
  set(statusRef,{name:username.value||"User",online:true});
}
username.addEventListener("input",updateStatus);

onValue(ref(db,"online"),s=>{
  let txt="🟢 Online: ";
  Object.values(s.val()||{}).forEach(u=>{
    if(u.online) txt+=u.name+", ";
  });
  onlineUsers.innerText=txt.replace(/, $/,"");
});

// ✅ typing
let t;
message.addEventListener("input",()=>{
  clearTimeout(t);
  set(ref(db,"typing/"+userId),{name:username.value,typing:true});
  t=setTimeout(()=>remove(ref(db,"typing/"+userId)),1500);
});

onValue(ref(db,"typing"),s=>{
  let txt="";
  Object.values(s.val()||{}).forEach(u=>{
    if(u.typing) txt+=u.name+" typt... ";
  });
  typing.innerText=txt;
});

// ✅ release username
window.addEventListener("beforeunload",()=>{
  if(currentUsername){
    remove(ref(db,"usernames/"+currentUsername));
  }
});

// ✅ enter send
message.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
