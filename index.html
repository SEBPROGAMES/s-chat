<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Chat</title>

<style>
/* 🔒 Perfecte hoek-knop */
#themeToggle{
  position:fixed;
  top:0;
  right:0;
  padding:8px 12px;
  border-radius:0 0 0 12px;
  background:#222;
  color:white;
  border:none;
  cursor:pointer;
  z-index:9999;
  width:auto !important;
  margin:0;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
}

/* 🌞 LIGHT */
body.light{ background:#f2f2f7; color:#111; }
body.light .card{ background:#ffffff; }
body.light input, body.light textarea{ background:#e5e5ea; color:#000; }
body.light .chat-message{ background:#dddddd; }

body{
  font-family:Arial;
  background:#0b0b15;
  color:white;
  padding:20px;
  margin:0;
}

.container{max-width:800px;margin:auto}
.card{background:#151520;padding:20px;border-radius:20px;margin-bottom:20px}

input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#1e1e2f;
  color:white;
}

textarea{resize:none;}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#6d28d9;
  color:white;
  cursor:pointer;
  margin-top:6px;
}

.chat-message{
  background:#11111a;
  padding:12px;
  border-radius:15px;
  margin-bottom:10px;
}

.small{font-size:0.8rem;opacity:0.7}
.admin{border:3px solid red}
</style>
</head>

<body>

<button id="themeToggle">🌙</button>

<div class="container">

<div class="card">
<h2>🔐 Secure Chat</h2>
<div id="onlineUsers" class="small"></div>

<input id="username" placeholder="Naam">
<textarea id="message" placeholder="Bericht"></textarea>
<input type="password" id="password" placeholder="Wachtwoord">

<div id="typing" class="small"></div>
<button onclick="sendMessage()">Verstuur</button>
</div>

<div class="card">
<h3>💬 Chat</h3>
<div id="chatBox"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, push, onChildAdded, onValue,
  remove, set, onDisconnect, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ✅ Firebase */
const app = initializeApp({
  apiKey: "AIzaSyAOf0zOHS74vTPFlt4HMwjnCg-7FobaBk0",
  authDomain: "fir-chat-53f7d.firebaseapp.com",
  databaseURL: "https://fir-chat-53f7d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fir-chat-53f7d"
});
const db = getDatabase(app);

/* ✅ CONSTANTEN */
const USER_VISIBLE_TIME = 3600000;
const ADMIN_VISIBLE_TIME = 43200000;

const ADMIN_TRIGGER = "/admin";
const ADMIN_PASSWORD = "/admin";

const encoder = new TextEncoder();
const decoder = new TextDecoder();

const userId = Math.random().toString(36).slice(2);

/* ✅ STATE */
let currentUsername = "";
let isAdmin = false;
let lastMessageTime = 0;
let lastMessageText = "";

/* ✅ HELPERS */
const b64 = x => btoa(String.fromCharCode(...new Uint8Array(x)));
const fromB64 = x => Uint8Array.from(atob(x),c=>c.charCodeAt(0));

async function getKey(password, salt){
  const km = await crypto.subtle.importKey("raw", encoder.encode(password),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt,iterations:250000,hash:"SHA-256"},
    km,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt","decrypt"]
  );
}

/* ✅ USERNAME */
async function claimUsername(name){
  const r = ref(db,"usernames/"+name);
  const res = await runTransaction(r,c=>c===null ? userId : undefined);
  if(res.committed) onDisconnect(r).remove();
  return res.committed;
}

/* ✅ SEND */
window.sendMessage = async () => {

  const u = username.value.trim();
  const m = message.value;
  const p = password.value;

  if(!u || !m || !p) return alert("Vul alles in");

  const now = Date.now();
  if(now - lastMessageTime < 2000) return alert("Te snel");
  if(m === lastMessageText) return alert("Geen spam");

  lastMessageTime = now;
  lastMessageText = m;

  /* ✅ ADMIN */
  if(m === ADMIN_TRIGGER && p === ADMIN_PASSWORD){
    if(u !== "X") return alert("Geen admin");
    isAdmin = true;
    document.body.classList.add("admin");
    reloadMessages();
    return;
  }

  const ok = await claimUsername(u);
  if(!ok && currentUsername !== u) return alert("Naam bezet");
  currentUsername = u;

  /* ✅ ENCRYPT */
  const saltUser = crypto.getRandomValues(new Uint8Array(16));
  const ivUser = crypto.getRandomValues(new Uint8Array(12));
  const saltAdmin = crypto.getRandomValues(new Uint8Array(16));
  const ivAdmin = crypto.getRandomValues(new Uint8Array(12));

  const encUser = await crypto.subtle.encrypt(
    {name:"AES-GCM",iv:ivUser},
    await getKey(p,saltUser),
    encoder.encode(m)
  );

  const encAdmin = await crypto.subtle.encrypt(
    {name:"AES-GCM",iv:ivAdmin},
    await getKey(ADMIN_PASSWORD,saltAdmin),
    encoder.encode(m)
  );

  set(push(ref(db,"messages")),{
    user:u,
    saltUser:b64(saltUser),
    ivUser:b64(ivUser),
    dataUser:b64(encUser),
    saltAdmin:b64(saltAdmin),
    ivAdmin:b64(ivAdmin),
    dataAdmin:b64(encAdmin),
    time:Date.now()
  });

  message.value="";
};

/* ✅ MESSAGE UI */
function bubble(msg,key){

  const age = Date.now() - msg.time;
  if(!isAdmin && age > USER_VISIBLE_TIME) return;
  if(isAdmin && age > ADMIN_VISIBLE_TIME) return;

  const wrap=document.createElement("div");
  wrap.className="chat-message";

  wrap.innerHTML=`
    <b>${msg.user}</b>
    ${isAdmin ? `<span class="small">(${new Date(msg.time).toLocaleTimeString()})</span>` : ""}
    <br>
    <input type="password" class="pw">
    <button class="dec">Ontsleutel</button>
    <div></div>
  `;

  wrap.querySelector(".dec").onclick=async()=>{
    try{
      const pw = wrap.querySelector(".pw").value;

      const data = (isAdmin && pw === ADMIN_PASSWORD)
        ? {iv:msg.ivAdmin,salt:msg.saltAdmin,data:msg.dataAdmin}
        : {iv:msg.ivUser,salt:msg.saltUser,data:msg.dataUser};

      const dec = await crypto.subtle.decrypt(
        {name:"AES-GCM",iv:fromB64(data.iv)},
        await getKey(pw,fromB64(data.salt)),
        fromB64(data.data)
      );

      wrap.querySelector("div").innerText = decoder.decode(dec);
    }catch{
      wrap.querySelector("div").innerText="❌ fout";
    }
  };

  const del=document.createElement("button");
  del.innerText="🗑️";
  if(!isAdmin) del.style.display="none";

  del.onclick=async()=>{
    await remove(ref(db,"messages/"+key));
    wrap.remove();
  };

  wrap.appendChild(del);
  chatBox.prepend(wrap);
}

/* ✅ REALTIME */
onChildAdded(ref(db,"messages"),snap=>bubble(snap.val(),snap.key));

/* ✅ ADMIN RELOAD */
function reloadMessages(){
  chatBox.innerHTML="";
  onValue(ref(db,"messages"),snap=>{
    const data=snap.val();
    if(data) Object.entries(data).forEach(([k,m])=>bubble(m,k));
  });
}

/* ✅ AUTO DELETE */
onValue(ref(db,"messages"),snap=>{
  const data=snap.val();
  if(!data) return;
  Object.entries(data).forEach(([k,m])=>{
    if(Date.now()-m.time > ADMIN_VISIBLE_TIME){
      remove(ref(db,"messages/"+k));
    }
  });
});

/* ✅ ONLINE + TYPING (ongewijzigd logisch, maar compacter) */
const statusRef = ref(db,"online/"+userId);

onValue(ref(db,".info/connected"),snap=>{
  if(!snap.val()) return;

  const name = username.value.trim() || "Gebruiker";
  set(statusRef,{name,online:true});

  onDisconnect(statusRef).remove();
  onDisconnect(ref(db,"typing/"+userId)).remove();
});

username.oninput=()=>{
  set(statusRef,{name:username.value.trim()||"Gebruiker",online:true});
};

onValue(ref(db,"online"),snap=>{
  const data=snap.val();
  if(!data) return onlineUsers.innerText="🔴 Niemand online";

  const names = Object.values(data).map(u=>u.name).filter(Boolean);
  onlineUsers.innerText = names.length
    ? "🟢 Online: " + names.join(", ")
    : "🔴 Niemand online";
});

let typingTimer;

message.oninput=()=>{
  clearTimeout(typingTimer);

  set(ref(db,"typing/"+userId),{
    name:username.value.trim()||"Gebruiker",
    typing:true
  });

  typingTimer=setTimeout(()=>{
    remove(ref(db,"typing/"+userId));
  },1500);
};

onValue(ref(db,"typing"),snap=>{
  const data=snap.val();
  typing.innerText = data
    ? Object.values(data)
        .filter(u=>u.typing && u.name)
        .map(u=>u.name+" typt...")
        .join(" ")
    : "";
});

/* ✅ CLEANUP */
window.addEventListener("beforeunload",()=>{
  if(currentUsername){
    remove(ref(db,"usernames/"+currentUsername));
  }
});

message.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

/* 🔒🌙 THEME (LOCKED + FIXED) */
const toggleBtn = document.getElementById("themeToggle");
let toggleLocked = false;

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
  toggleBtn.innerText="🌞";
}

toggleBtn.onclick=()=>{
  if(toggleLocked) return;
  toggleLocked=true;

  document.body.classList.toggle("light");

  if(document.body.classList.contains("light")){
    localStorage.setItem("theme","light");
    toggleBtn.innerText="🌞";
  }else{
    localStorage.setItem("theme","dark");
    toggleBtn.innerText="🌙";
  }

  setTimeout(()=>toggleLocked=false,300);
};
</script>
</body>
</html>
