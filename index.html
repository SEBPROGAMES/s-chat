<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Chat</title>

<style>
body{
  font-family:Arial;
  background:#0b0b15;
  color:white;
  padding:20px;
  margin:0; /* ✅ mobile fix */
}

.container{max-width:800px;margin:auto}

.card{
  background:#151520;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px
}

input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#1e1e2f;
  color:white;
}

textarea{resize:none;} /* ✅ mobile fix */

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#6d28d9;
  color:white;
  cursor:pointer;
  margin-top:6px
}

.chat-message{
  background:#11111a;
  padding:12px;
  border-radius:15px;
  margin-bottom:10px
}

.small{font-size:0.8rem;opacity:0.7}
.admin{border:3px solid red}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🔐 Secure Chat</h2>

<div id="onlineUsers" class="small"></div>

<input id="username" placeholder="Naam">
<textarea id="message" placeholder="Bericht"></textarea>
<input type="password" id="password" placeholder="Wachtwoord">

<div id="typing" class="small"></div>

<button onclick="sendMessage()">Verstuur</button>
</div>

<div class="card">
<h3>💬 Chat</h3>
<div id="chatBox"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, push, onChildAdded, onValue,
  remove, set, onDisconnect, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOf0zOHS74vTPFlt4HMwjnCg-7FobaBk0",
  authDomain: "fir-chat-53f7d.firebaseapp.com",
  databaseURL: "https://fir-chat-53f7d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fir-chat-53f7d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const USER_VISIBLE_TIME = 60*60*1000;
const ADMIN_VISIBLE_TIME = 12*60*60*1000;
const userId = Math.random().toString(36).slice(2);

let currentUsername="";
let isAdmin=false;

let lastMessageTime=0;
let lastMessageText="";

const ADMIN_TRIGGER="/admin";
const ADMIN_PASSWORD="/admin";

const encoder=new TextEncoder();
const decoder=new TextDecoder();

async function getKey(p,s){
  const km=await crypto.subtle.importKey("raw",encoder.encode(p),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:s,iterations:250000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"])
}

const b64=x=>btoa(String.fromCharCode(...new Uint8Array(x)));
const fromB64=x=>Uint8Array.from(atob(x),c=>c.charCodeAt(0));

async function claimUsername(name){
  const r=ref(db,"usernames/"+name);
  const res=await runTransaction(r,c=>{if(c===null)return userId});
  if(res.committed) onDisconnect(r).remove();
  return res.committed;
}

// ✅ SEND
window.sendMessage=async()=>{
  const u=username.value.trim();
  const m=message.value;
  const p=password.value;

  if(!u||!m||!p)return alert("Vul alles");

  const now=Date.now();
  if(now-lastMessageTime<2000)return alert("Te snel");
  if(m===lastMessageText)return alert("Spam");

  lastMessageTime=now;
  lastMessageText=m;

  if(m===ADMIN_TRIGGER&&p===ADMIN_PASSWORD){
    if(u!=="X")return alert("Geen admin");
    isAdmin=true;
    document.body.classList.add("admin");
    reloadMessages();
    return;
  }

  const ok=await claimUsername(u);
  if(!ok&&currentUsername!==u)return alert("Naam bezet");

  currentUsername=u;

  const saltUser=crypto.getRandomValues(new Uint8Array(16));
  const ivUser=crypto.getRandomValues(new Uint8Array(12));
  const keyUser=await getKey(p,saltUser);

  const encUser=await crypto.subtle.encrypt({name:"AES-GCM",iv:ivUser},keyUser,encoder.encode(m));

  const saltAdmin=crypto.getRandomValues(new Uint8Array(16));
  const ivAdmin=crypto.getRandomValues(new Uint8Array(12));
  const keyAdmin=await getKey(ADMIN_PASSWORD,saltAdmin);

  const encAdmin=await crypto.subtle.encrypt({name:"AES-GCM",iv:ivAdmin},keyAdmin,encoder.encode(m));

  const msgRef=push(ref(db,"messages"));

  set(msgRef,{
    user:u,
    saltUser:b64(saltUser),
    ivUser:b64(ivUser),
    dataUser:b64(encUser),
    saltAdmin:b64(saltAdmin),
    ivAdmin:b64(ivAdmin),
    dataAdmin:b64(encAdmin),
    time:Date.now()
  });

  message.value="";
};

// ✅ BUBBLE
function bubble(msg,key){

  const age=Date.now()-msg.time;
  if(!isAdmin&&age>USER_VISIBLE_TIME)return;
  if(isAdmin&&age>ADMIN_VISIBLE_TIME)return;

  const wrap=document.createElement("div");
  wrap.className="chat-message";

  let time="";
  if(isAdmin){
    time=`<span class="small">(${new Date(msg.time).toLocaleTimeString()})</span>`;
  }

  wrap.innerHTML=`
    <b>${msg.user}</b> ${time}<br>
    <input type="password" class="pw">
    <button class="dec">Ontsleutel</button>
    <div></div>
  `;

  wrap.querySelector(".dec").onclick=async()=>{
    try{
      const pw=wrap.querySelector(".pw").value;
      let dec;

      if(isAdmin&&pw===ADMIN_PASSWORD){
        dec=await crypto.subtle.decrypt(
          {name:"AES-GCM",iv:fromB64(msg.ivAdmin)},
          await getKey(pw,fromB64(msg.saltAdmin)),
          fromB64(msg.dataAdmin)
        );
      }else{
        dec=await crypto.subtle.decrypt(
          {name:"AES-GCM",iv:fromB64(msg.ivUser)},
          await getKey(pw,fromB64(msg.saltUser)),
          fromB64(msg.dataUser)
        );
      }

      wrap.querySelector("div").innerText=decoder.decode(dec);

    }catch{
      wrap.querySelector("div").innerText="❌ fout";
    }
  };

  const del=document.createElement("button");
  del.innerText="🗑️";
  if(!isAdmin) del.style.display="none";

  del.onclick=async()=>{
    await remove(ref(db,"messages/"+key));
    wrap.remove();
  };

  wrap.appendChild(del);
  chatBox.prepend(wrap);

  // ✅ auto scroll
  chatBox.scroll({
    top:0,
    behavior:"smooth"
  });
}

// ✅ reload
function reloadMessages(){
  chatBox.innerHTML="";
  onValue(ref(db,"messages"),snap=>{
    const data=snap.val();
    if(!data)return;
    Object.entries(data).forEach(([k,m])=>bubble(m,k));
  });
}

// ✅ realtime
onChildAdded(ref(db,"messages"),snap=>bubble(snap.val(),snap.key));

// ✅ delete na 12u
onValue(ref(db,"messages"),snap=>{
  Object.entries(snap.val()||{}).forEach(([k,m])=>{
    if(Date.now()-m.time>ADMIN_VISIBLE_TIME){
      remove(ref(db,"messages/"+k));
    }
  });
});

// ✅ ✅ ONLINE FIX (stabiel + geen ghost users)
const statusRef=ref(db,"online/"+userId);
const connectedRef=ref(db,".info/connected");

onValue(connectedRef,snap=>{
  if(snap.val()===true){

    const name=username.value.trim()||"Gebruiker";

    set(statusRef,{
      name:name,
      online:true
    });

    // ✅ verwijder volledig bij disconnect (NIET false zetten!)
    onDisconnect(statusRef).remove();

    // ✅ cleanup typing
    onDisconnect(ref(db,"typing/"+userId)).remove();
  }
});

username.addEventListener("input",()=>{
  set(statusRef,{
    name:username.value.trim()||"Gebruiker",
    online:true
  });
});

// ✅ online lijst
onValue(ref(db,"online"),snap=>{
  const data=snap.val();

  if(!data){
    onlineUsers.innerText="🔴 Niemand online";
    return;
  }

  const names=[];
  Object.values(data).forEach(u=>{
    if(u.name) names.push(u.name);
  });

  onlineUsers.innerText=names.length
    ? "🟢 Online: "+names.join(", ")
    : "🔴 Niemand online";
});

// ✅ typing
let t;
message.addEventListener("input",()=>{
  clearTimeout(t);

  set(ref(db,"typing/"+userId),{
    name:username.value.trim()||"Gebruiker",
    typing:true
  });

  t=setTimeout(()=>remove(ref(db,"typing/"+userId)),1500);
});

onValue(ref(db,"typing"),snap=>{
  let txt="";
  Object.values(snap.val()||{}).forEach(u=>{
    if(u.typing) txt+=u.name+" typt... ";
  });
  typing.innerText=txt;
});

// ✅ username cleanup
window.addEventListener("beforeunload",()=>{
  if(currentUsername){
    remove(ref(db,"usernames/"+currentUsername));
  }
});

// enter send
message.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
