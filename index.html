<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Secure Chat Encryptor</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:
        radial-gradient(circle at top left,#1e1b4b,#09090f 40%);
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:20px;
    }

    .app{
      width:100%;
      max-width:700px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border-radius:24px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    h1{
      margin-top:0;
      font-size:2rem;
      text-align:center;
    }

    .subtitle{
      text-align:center;
      opacity:0.7;
      margin-bottom:25px;
    }

    h2{
      margin-top:0;
      font-size:1.2rem;
    }

    textarea,
    input{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:14px;
      margin-top:10px;
      margin-bottom:12px;
      background:#151520;
      color:white;
      font-size:1rem;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:translateY(-2px);
    }

    .primary{
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:white;
      width:100%;
    }

    .copy{
      background:#27272f;
      color:white;
      margin-top:10px;
      width:100%;
    }

    .output{
      margin-top:14px;
      background:#0f0f17;
      border-radius:16px;
      padding:14px;
      word-break:break-word;
      white-space:pre-wrap;
      min-height:60px;
    }

    .success{
      color:#4ade80;
      margin-top:8px;
      font-size:0.95rem;
    }

    footer{
      text-align:center;
      opacity:0.5;
      font-size:0.85rem;
      margin-top:15px;
    }

    @media(max-width:600px){
      h1{
        font-size:1.6rem;
      }

      .card{
        padding:18px;
      }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="card">
    <h1>🔐 Secure Message Encryptor</h1>
    <div class="subtitle">
      End-to-end AES-GCM versleuteling in je browser
    </div>
  </div>

  <div class="card">

    <h2>Bericht versleutelen</h2>

    <textarea
      id="message"
      placeholder="Typ je geheime bericht..."
    ></textarea>

    <input
      type="password"
      id="password"
      placeholder="Wachtwoord"
    />

    <button class="primary" onclick="encryptMessage()">
      Versleutel Bericht
    </button>

    <div class="output" id="encryptedOutput"></div>

    <button class="copy" onclick="copyEncrypted()">
      Kopieer Versleutelde Tekst
    </button>

    <div class="success" id="copyStatus"></div>

  </div>

  <div class="card">

    <h2>Bericht ontsleutelen</h2>

    <textarea
      id="encryptedInput"
      placeholder="Plak versleutelde tekst..."
    ></textarea>

    <input
      type="password"
      id="decryptPassword"
      placeholder="Wachtwoord"
    />

    <button class="primary" onclick="decryptMessage()">
      Ontsleutel Bericht
    </button>

    <div class="output" id="decryptedOutput"></div>

  </div>

  <footer>
    Gemaakt met Web Crypto API • GitHub Pages Ready
  </footer>

</div>

<script>
  const encoder = new TextEncoder();
  const decoder = new TextDecoder();

  async function getKey(password, salt) {
    const keyMaterial = await crypto.subtle.importKey(
      "raw",
      encoder.encode(password),
      "PBKDF2",
      false,
      ["deriveKey"]
    );

    return crypto.subtle.deriveKey(
      {
        name: "PBKDF2",
        salt,
        iterations: 250000,
        hash: "SHA-256"
      },
      keyMaterial,
      {
        name: "AES-GCM",
        length: 256
      },
      false,
      ["encrypt", "decrypt"]
    );
  }

  function arrayBufferToBase64(buffer) {
    return btoa(String.fromCharCode(...new Uint8Array(buffer)));
  }

  function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    return Uint8Array.from(binary, c => c.charCodeAt(0));
  }

  async function encryptMessage() {

    const message =
      document.getElementById("message").value;

    const password =
      document.getElementById("password").value;

    if (!message || !password) {
      alert("Vul bericht en wachtwoord in.");
      return;
    }

    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));

    const key = await getKey(password, salt);

    const encrypted = await crypto.subtle.encrypt(
      {
        name: "AES-GCM",
        iv
      },
      key,
      encoder.encode(message)
    );

    const combined = {
      salt: arrayBufferToBase64(salt),
      iv: arrayBufferToBase64(iv),
      data: arrayBufferToBase64(encrypted)
    };

    document.getElementById("encryptedOutput")
      .innerText =
      JSON.stringify(combined);
  }

  async function decryptMessage() {

    const input =
      document.getElementById("encryptedInput").value;

    const password =
      document.getElementById("decryptPassword").value;

    try {

      const parsed = JSON.parse(input);

      const salt =
        base64ToArrayBuffer(parsed.salt);

      const iv =
        base64ToArrayBuffer(parsed.iv);

      const data =
        base64ToArrayBuffer(parsed.data);

      const key =
        await getKey(password, salt);

      const decrypted =
        await crypto.subtle.decrypt(
          {
            name:"AES-GCM",
            iv
          },
          key,
          data
        );

      document.getElementById("decryptedOutput")
        .innerText =
        decoder.decode(decrypted);

    } catch {

      document.getElementById("decryptedOutput")
        .innerText =
        "❌ Verkeerd wachtwoord of corrupte data.";

    }
  }

  async function copyEncrypted() {

    const text =
      document.getElementById("encryptedOutput")
      .innerText;

    if (!text) return;

    await navigator.clipboard.writeText(text);

    document.getElementById("copyStatus")
      .innerText =
      "✅ Gekopieerd naar klembord";

    setTimeout(() => {
      document.getElementById("copyStatus")
        .innerText = "";
    }, 2500);
  }
</script>

</body>
</html>
