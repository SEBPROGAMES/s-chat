<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Chat</title>

<style>
body{font-family:Arial;background:#0b0b15;color:white;padding:20px}
.container{max-width:800px;margin:auto}
.card{background:#151520;padding:20px;border-radius:20px;margin-bottom:20px}
input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;background:#1e1e2f;color:white}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#6d28d9;color:white;cursor:pointer}
.chat-message{background:#11111a;padding:12px;border-radius:15px;margin-bottom:10px}
.small{font-size:0.8rem;opacity:0.7}
.admin{border:2px solid red}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🔐 Secure Chat</h2>

<div id="onlineUsers" class="small"></div>

<input id="username" placeholder="Naam">
<textarea id="message" placeholder="Bericht"></textarea>
<input type="password" id="password" placeholder="Wachtwoord">

<div id="typing" class="small"></div>

<button onclick="sendMessage()">Verstuur</button>
</div>

<div class="card">
<h3>💬 Chat</h3>
<div id="chatBox"></div>
</div>

</div>

<script type="module">
// 🔥 HIER jouw echte config laten staan!
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue, remove, set, onDisconnect, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOf0zOHS74vTPFlt4HMwjnCg-7FobaBk0",
  authDomain: "fir-chat-53f7d.firebaseapp.com",
  databaseURL: "https://fir-chat-53f7d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fir-chat-53f7d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const DELETE_TIME = 60*60*1000;
const userId = Math.random().toString(36).slice(2);

let currentUsername = "";
let isAdmin = false;

const ADMIN_TRIGGER = "/admin";
const ADMIN_PASSWORD = "supergeheim";

const encoder = new TextEncoder();
const decoder = new TextDecoder();

async function getKey(password, salt){
  const km = await crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:250000, hash:"SHA-256"},
    km,
    {name:"AES-GCM", length:256},
    false,
    ["encrypt","decrypt"]
  );
}

function b64(x){return btoa(String.fromCharCode(...new Uint8Array(x)));}
function fromB64(x){const bin=atob(x);return Uint8Array.from(bin,c=>c.charCodeAt(0));}

async function claimUsername(name){
  const r = ref(db,"usernames/"+name);
  const res = await runTransaction(r, c=>{
    if(c===null) return userId;
  });
  return res.committed;
}

window.sendMessage = async ()=>{
  const u = username.value.trim();
  const m = message.value;
  const p = password.value;

  if(!u) return alert("Voer naam in");
  if(!m || !p) return alert("Vul alles in");

  if(m===ADMIN_TRIGGER && p===ADMIN_PASSWORD){
    isAdmin = true;
    document.body.classList.add("admin");
    alert("✅ Admin mode actief");
    return;
  }

  const ok = await claimUsername(u);
  if(!ok && currentUsername !== u) return alert("Naam al in gebruik!");

  currentUsername = u;

  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await getKey(p, salt);

  const enc = await crypto.subtle.encrypt(
    {name:"AES-GCM",iv},
    key,
    encoder.encode(m)
  );

  const msgRef = push(ref(db,"messages"));
  set(msgRef,{
    user:u,
    salt:b64(salt),
    iv:b64(iv),
    data:b64(enc),
    time:Date.now()
  });

  message.value="";
};

function bubble(msg, key){
  const wrap = document.createElement("div");
  wrap.className="chat-message";

  const time = new Date(msg.time).toLocaleTimeString();

  wrap.innerHTML=`
    <b>${msg.user}</b> <span class="small">(${time})</span><br>
    <input type="password" class="pw" placeholder="wachtwoord">
    <button class="dec">Ontsleutel</button>
    <div></div>
  `;

  wrap.querySelector(".dec").onclick=async()=>{
    try{
      const pw = wrap.querySelector(".pw").value;
      const keyCrypto = await getKey(pw, fromB64(msg.salt));

      const dec = await crypto.subtle.decrypt(
        {name:"AES-GCM",iv:fromB64(msg.iv)},
        keyCrypto,
        fromB64(msg.data)
      );

      wrap.querySelector("div").innerText = decoder.decode(dec);
    }catch{
      wrap.querySelector("div").innerText="❌ Fout wachtwoord";
    }
  };

  if(isAdmin){
    const del = document.createElement("button");
    del.innerText = "🗑️ Verwijder";
    del.onclick = ()=> remove(ref(db,"messages/"+key));
    wrap.appendChild(del);
  }

  chatBox.prepend(wrap);

  if(chatBox.children.length>100){
    chatBox.removeChild(chatBox.lastChild);
  }
}

onChildAdded(ref(db,"messages"), snap=>{
  const msg = snap.val();
  bubble(msg, snap.key);
});
</script>

</body>
</html>
